<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Workout Tracker</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="intro" aria-labelledby="page-title">
        <div>
          <p class="eyebrow">Today&apos;s training</p>
          <h1 id="page-title">Workout Tracker</h1>
          <p class="intro-copy">Log each exercise, set, rep count, and weight as you train.</p>
        </div>
        <div class="stats" aria-label="Workout summary">
          <div>
            <span id="exerciseCount">0</span>
            <small>Exercises</small>
          </div>
          <div>
            <span id="setCount">0</span>
            <small>Total sets</small>
          </div>
          <div>
            <span id="volumeCount">0</span>
            <small>Total volume</small>
          </div>
        </div>
      </section>

      <section class="tracker-grid">
        <form id="workoutForm" class="panel form-panel">
          <h2>Add a set</h2>

          <label for="exercise">Exercise</label>
          <input id="exercise" name="exercise" type="text" placeholder="Bench press" required />

          <div class="field-row">
            <div>
              <label for="sets">Sets</label>
              <input id="sets" name="sets" type="number" min="1" value="3" required />
            </div>
            <div>
              <label for="reps">Reps</label>
              <input id="reps" name="reps" type="number" min="1" value="10" required />
            </div>
          </div>

          <label for="weight">Weight</label>
          <div class="weight-input">
            <input id="weight" name="weight" type="number" min="0" step="0.5" value="0" required />
            <span>lb</span>
          </div>

          <button type="submit">Add exercise</button>
        </form>

        <section class="panel log-panel" aria-labelledby="log-title">
          <div class="log-header">
            <h2 id="log-title">Workout log</h2>
            <button id="clearButton" class="secondary-button" type="button">Clear all</button>
          </div>

          <div id="emptyState" class="empty-state">
            <p>No exercises yet.</p>
            <small>Add your first set using the form.</small>
          </div>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Exercise</th>
                  <th>Sets</th>
                  <th>Reps</th>
                  <th>Weight</th>
                  <th>Volume</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody id="workoutTable"></tbody>
            </table>
          </div>
        </section>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
